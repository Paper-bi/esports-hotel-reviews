<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞酒店好评生成器</title>
<style>
  :root {
    --bg: #0a0e17;
    --card: #131a2b;
    --border: #1e2d45;
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --text: #b0c0d0;
    --text-bright: #e0e8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(124,77,255,0.04) 0%, transparent 50%);
  }

  .header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .header .icon {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 2px;
  }

  .header .sub {
    font-size: 13px;
    color: var(--accent);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .photos {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 0 16px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }

  .photos::-webkit-scrollbar { height: 0; }

  .photos img {
    height: 180px;
    border-radius: 10px;
    scroll-snap-align: start;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .reviews {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .review-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    transition: border-color 0.2s;
  }

  .review-card:hover { border-color: var(--accent); }

  .review-stars {
    color: #ffb300;
    font-size: 14px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .review-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-bright);
    margin-bottom: 12px;
  }

  .review-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn-copy {
    background: linear-gradient(135deg, var(--accent2), #651fff);
    color: #fff;
  }

  .btn-copy:active { transform: scale(0.97); opacity: 0.9; }

  .btn-copy.copied {
    background: #00c853;
  }

  .btn-refresh {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .btn-refresh:active { background: #1a2540; }

  .btn-copy-all {
    background: linear-gradient(135deg, #00e5ff, #00b8d4);
    color: #000;
    width: 100%;
    justify-content: center;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .btn-copy-all:active { transform: scale(0.98); }

  .btn-copy-all.copied {
    background: #00c853;
    color: #fff;
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn-group .btn {
    flex: 1;
    justify-content: center;
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 4px;
    background: rgba(0,229,255,0.1);
    color: var(--accent);
  }

  .qr-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .qr-modal.show { display: flex; }
  .qr-box {
    background: #fff;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
  }
  .qr-box canvas { display: block; margin: 0 auto; }
  .qr-box .qr-title {
    color: #1a1a2e;
    font-size: 15px;
    font-weight: 700;
    margin-top: 12px;
  }
  .qr-box .qr-tip {
    color: #666;
    font-size: 12px;
    margin-top: 4px;
  }
  .btn-close-qr {
    margin-top: 16px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 10px 32px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-qr {
    background: linear-gradient(135deg, #ffb300, #ff8f00);
    color: #000;
    width: 100%;
    justify-content: center;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-family: inherit;
  }
  .btn-qr:active { transform: scale(0.98); }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #00c853;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .toast.show { opacity: 1; }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #4a5568;
    padding: 16px 0 24px;
  }

  .count-badge {
    text-align: center;
    font-size: 12px;
    color: #5a6a80;
    margin-bottom: 12px;
  }

  @media (min-width: 600px) {
    body { max-width: 500px; margin: 0 auto; }
    .photos img { height: 220px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<div class="toast" id="toast">已复制到剪贴板</div>

<div class="qr-modal" id="qrModal" onclick="if(event.target===this)closeQr()">
  <div class="qr-box">

    <div class="qr-tip">客人扫码后即可复制好评</div>
  </div>
  <button class="btn-close-qr" onclick="closeQr()">关闭</button>

<div class="header">
  <div class="icon">🎮</div>

  <div class="sub">随机评论 · 一键复制 · 客人无忧</div>
</div>

<div class="photos" id="photos"></div>
<div class="count-badge" id="photoCount"></div>

<div class="reviews" id="reviews"></div>

<button class="btn btn-copy-all" id="btnCopyAll" onclick="copyAll()">

</button>

<button class="btn-qr" onclick="showQr()">

<div class="btn-group">

<div class="footer">
  打开页面自动随机生成 · 截图或复制发给客人
</div>

const TOTAL_PHOTOS = 86;
let currentReviews = [];
let currentPhotos = [];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr, min, max) {
  const count = min + Math.floor(Math.random() * (max - min + 1));
  return shuffle(arr).slice(0, count);
}

function renderPhotos() {
  currentPhotos = pick([...Array(TOTAL_PHOTOS).keys()].map(i => i + 1), 3, 5).sort((a, b) => a - b);
  const container = document.getElementById('photos');
  container.innerHTML = currentPhotos.map(n =>
    `<img src="${n}.jpg" alt="酒店照片${n}" loading="lazy" onerror="this.style.display='none'">`
  ).join('');
  document.getElementById('photoCount').textContent = `展示 ${currentPhotos.length} 张酒店实拍照片`;
}

function renderReviews() {
  currentReviews = pick(REVIEWS, 1, 2);
  const container = document.getElementById('reviews');
  container.innerHTML = currentReviews.map((text, i) => `
    <div class="review-card">
      <div class="review-stars">⭐ 5.0 分 · 好评 #${i + 1}</div>
      <div class="review-text">${text}</div>
      <div class="review-actions">
        <button class="btn btn-copy" onclick="copyOne(${i}, this)">📋 复制这条</button>
      </div>
    </div>
  `).join('');
}

function refreshPhotos() {
  renderPhotos();
  toast('照片已刷新');
}

function refresh() {
  renderReviews();
  toast('评论已刷新');
}

function refreshAll() {
  renderPhotos();
  renderReviews();
  toast('已全部刷新');
}

function copyOne(index, btn) {
  const text = currentReviews[index];
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制这条';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制这条';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyAll() {
  const text = currentReviews.join('\n\n');
  const btn = document.getElementById('btnCopyAll');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 已复制全部评论';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 一键复制全部评论';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ 已复制全部评论';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 一键复制全部评论';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('show'), 1500);
}

function showQr() {
  const modal = document.getElementById('qrModal');
  modal.classList.add('show');
  const container = document.getElementById('qrCode');
  if (!container.innerHTML) {
    const url = window.location.href;
    new QRCode(container, {
      text: url,
      width: 220,
      height: 220,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff'
    });
  }
}

function closeQr() {
  document.getElementById('qrModal').classList.remove('show');
}

// init
renderPhotos();
renderReviews();
</script>
